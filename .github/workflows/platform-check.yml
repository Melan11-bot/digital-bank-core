name: Platform Integrity Check
on: [push]
jobs:
  check-environment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Sanity Test
        run: python tests/platform_test.py
